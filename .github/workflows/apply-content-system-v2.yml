name: Apply content system v2

on:
  push:
    branches:
      - feat/content-system-v2

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Rebuild migration script
        run: |
          cat scripts/.content-system-v2-part* | base64 --decode | gzip --decompress > scripts/apply_content_system_v2.py
          python -m py_compile scripts/apply_content_system_v2.py
      - name: Apply migration
        run: python scripts/apply_content_system_v2.py
      - name: Install dependencies
        run: npm ci
      - name: Run checks
        run: npm run check
      - name: Commit generated changes
        run: |
          rm -f scripts/.content-system-v2-part* scripts/apply_content_system_v2.py .github/workflows/apply-content-system-v2.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "feat: introduce content system v2"
          git push
