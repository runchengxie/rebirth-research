name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci
      - name: Install Python dependencies
        run: uv sync --only-dev
      - name: Prepare diagnostic logs
        run: mkdir -p .ci-logs

      - name: Ruff lint
        run: set -o pipefail; uv run ruff check . 2>&1 | tee .ci-logs/ruff-lint.log
      - name: Ruff format
        run: set -o pipefail; uv run ruff format --check . 2>&1 | tee .ci-logs/ruff-format.log
      - name: Python compile
        run: set -o pipefail; uv run python -m compileall scripts 2>&1 | tee .ci-logs/compileall.log
      - name: BasedPyright
        run: set -o pipefail; uv run basedpyright scripts 2>&1 | tee .ci-logs/basedpyright.log
      - name: Pytest
        run: set -o pipefail; uv run pytest scripts/ -v 2>&1 | tee .ci-logs/pytest.log
      - name: Validate static data
        run: set -o pipefail; uv run python scripts/validate_data.py 2>&1 | tee .ci-logs/validate-data.log

      - name: Validate frontend structure
        run: set -o pipefail; node scripts/validate_frontend.js 2>&1 | tee .ci-logs/validate-frontend.log
      - name: ESLint
        run: set -o pipefail; npm run lint:ci 2>&1 | tee .ci-logs/eslint.log
      - name: Typecheck frontend
        run: set -o pipefail; npm run typecheck 2>&1 | tee .ci-logs/typecheck.log
      - name: Unit tests
        run: set -o pipefail; npm run test:run 2>&1 | tee .ci-logs/vitest.log
      - name: Build frontend
        run: set -o pipefail; npm run build 2>&1 | tee .ci-logs/build.log

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-failure-logs
          path: .ci-logs
          if-no-files-found: error
          retention-days: 7
