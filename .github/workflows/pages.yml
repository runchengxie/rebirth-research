name: Quality and Pages

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Lint
        run: npm run lint:ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit and integration tests
        run: npm run test:run
      - name: Frontend contract validation
        run: npm run validate:frontend
      - name: Brand reference validation
        run: npm run validate:brand
      - name: Production build
        run: npm run build
      - name: Bundle budget validation
        run: npm run validate:bundle
      - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5
      - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  e2e:
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Install pinned browser test runtime
        run: |
          npm install --no-save --no-package-lock @playwright/test@1.55.0 @axe-core/playwright@4.10.2
          npx playwright install --with-deps chromium
      - name: Browser journeys and accessibility
        run: npm run test:e2e
      - name: Upload browser diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diagnostics
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [quality, e2e]
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
