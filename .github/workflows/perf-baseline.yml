name: Performance optimization

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  optimize:
    if: github.head_ref == 'perf/lazy-timeline-tree'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - id: apply
        name: Apply lazy archive and tree view
        shell: bash
        run: |
          set +e
          : > apply.log
          code=0
          if ! grep -q 'loadArchiveDrawer' src/app/ImmersiveGameScreen.tsx; then
            python scripts/dev/fix_perf_patch_script.py >> apply.log 2>&1
            first=$?
            if [ "$first" -eq 0 ]; then
              python scripts/dev/apply_perf_lazy_tree.py >> apply.log 2>&1
              code=$?
            else
              code=$first
            fi
          else
            echo "optimization already applied" >> apply.log
          fi
          if [ "$code" -eq 0 ] && ! grep -q '父子分支树' docs/ux.md; then
            python scripts/dev/update_perf_docs.py >> apply.log 2>&1
            code=$?
          fi
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Commit optimization
        if: steps.apply.outputs.exit_code == '0'
        shell: bash
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add AGENTS.md docs src scripts package.json vite.config.ts
            git commit -m "perf: 完成懒加载与树状回溯优化"
            git push origin HEAD:${{ github.head_ref }}
          fi
      - uses: actions/setup-node@v4
        if: steps.apply.outputs.exit_code == '0'
        with:
          node-version: "22"
          cache: npm
      - if: steps.apply.outputs.exit_code == '0'
        run: npm ci
      - id: full-check
        if: steps.apply.outputs.exit_code == '0'
        shell: bash
        run: |
          set +e
          npm run check > perf-check.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          if [ -d dist/assets ]; then
            {
              echo "=== JavaScript assets ==="
              find dist/assets -maxdepth 1 -type f -name '*.js' -printf '%s %f\n' | sort -nr
              echo "=== CSS assets ==="
              find dist/assets -maxdepth 1 -type f -name '*.css' -printf '%s %f\n' | sort -nr
              echo "=== Check output ==="
              cat perf-check.log
            } > perf-optimized.txt
          else
            cp perf-check.log perf-optimized.txt
          fi
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: perf-optimized
          path: |
            apply.log
            perf-optimized.txt
          if-no-files-found: ignore
      - name: Fail when optimization failed
        if: steps.apply.outputs.exit_code != '0' || steps.full-check.outputs.exit_code != '0'
        run: exit 1
