name: Rebirth v2 check

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  check:
    if: github.head_ref == 'feat/rebirth-office-key-months'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Finalize docs and validation
        run: python scripts/dev/finalize_rebirth_v2.py
      - name: Commit finalization
        shell: bash
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs scripts/validate_frontend.js
            git commit -m "docs: 完成重生二期文档与结构校验"
            git push origin HEAD:${{ github.head_ref }}
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - id: full-check
        shell: bash
        run: |
          set +e
          npm run check > check.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: rebirth-v2-check-log
          path: check.log
      - name: Fail when check failed
        if: steps.full-check.outputs.exit_code != '0'
        run: exit 1
