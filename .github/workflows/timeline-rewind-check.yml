name: Timeline rewind check

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  check:
    if: github.head_ref == 'feat/timeline-rewind-system'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Apply lint fixes
        run: python scripts/dev/fix_timeline_lint.py
      - name: Commit fixes
        shell: bash
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src
            git commit -m "fix: 修正回溯系统检查问题"
            git push origin HEAD:${{ github.head_ref }}
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - id: full-check
        shell: bash
        run: |
          set +e
          npm run check > timeline-check.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: timeline-rewind-check-log
          path: timeline-check.log
      - name: Fail when check failed
        if: steps.full-check.outputs.exit_code != '0'
        run: exit 1
